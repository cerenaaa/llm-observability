name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pytest
      - name: Test cost tracker
        run: |
          python - <<'PYEOF'
          from cost_tracker import CostTracker
          t = CostTracker()
          cost = t.record('claude-sonnet-4-20250514', 1000, 200)
          assert cost > 0
          status = t.budget_status()
          assert 'daily_spend_usd' in status
          print('cost tracker OK, cost =', round(cost, 6))
          PYEOF
      - name: Test alert engine
        run: |
          python - <<'PYEOF'
          from alerts import build_default_engine
          engine = build_default_engine()
          alerts = engine.evaluate({'latency_p95_ms': 3000, 'error_rate': 0.01, 'daily_cost_usd': 1})
          assert len(alerts) == 1
          assert alerts[0].metric == 'latency_p95'
          print('alerts OK')
          PYEOF
      - run: python demo.py
